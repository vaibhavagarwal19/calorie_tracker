<div class="modal fade" id="addDataModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content add-data-modal">
            <div class="modal-header">
                <h5 class="modal-title">Add Data for <span id="modal-user-name">{{ modal_user_name }}</span></h5>
                <ul class="nav nav-tabs" role="tablist">
                    <li class="nav-item">
                        <a class="nav-link active" id="food-tab" data-toggle="tab" href="#food" role="tab">Add Food</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="activity-tab" data-toggle="tab" href="#activity" role="tab">Add Activity</a>
                    </li>
                </ul>
            </div>
            <div class="modal-body">
                <input type="hidden" id="modal-user-id" value="{{ modal_user_id }}">
                <div class="tab-content">
                    <!-- Food Tab -->
                    <div class="tab-pane fade show active" id="food" role="tabpanel">
                        <form id="food-form">
                            <div class="input-field">
                                <label>Select Date</label>
                                <input type="date" id="food-date" max="{{ today }}" min="{{ min_date }}" value="{{ default_date }}">
                            </div>
                            <div class="input-field">
                                <label>Search Food</label>
                                <div class="search-wrapper">
                                    <input type="text" id="food-search" placeholder="Type to search (e.g. chicken, apple)..." autocomplete="off">
                                    <div class="search-results" id="food-search-results"></div>
                                </div>
                            </div>
                            <div class="input-field">
                                <label>Or Browse by Food Group</label>
                                <select id="food-group-select" class="selectbox">
                                    <option value="">-- Select Group --</option>
                                    {% for group in food_groups %}
                                    <option value="{{ group }}">{{ group }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="input-field">
                                <label>Food Name</label>
                                <select id="food-select" class="selectbox">
                                    <option value="">-- Select food group first --</option>
                                </select>
                            </div>
                            <div class="input-field">
                                <label>Meal Type</label>
                                <select id="food-meal-type" class="selectbox">
                                    <option value="breakfast">Breakfast</option>
                                    <option value="lunch">Lunch</option>
                                    <option value="dinner">Dinner</option>
                                    <option value="snack">Snack</option>
                                </select>
                            </div>
                            <div class="input-field">
                                <label>Servings</label>
                                <input type="number" id="food-servings" step="0.5" min="0.5" value="1" placeholder="Servings">
                            </div>
                            <div class="input-field">
                                <label>Calories: <strong id="food-calories-display">0</strong></label>
                            </div>
                            <div class="input-field input-field-btn btn-set--center">
                                <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                                <button type="button" class="btn btn-primary" id="save-food-btn">Save</button>
                            </div>
                        </form>
                    </div>
                    <!-- Activity Tab -->
                    <div class="tab-pane fade" id="activity" role="tabpanel">
                        <form id="activity-form">
                            <div class="input-field">
                                <label>Select Date</label>
                                <input type="date" id="activity-date" max="{{ today }}" min="{{ min_date }}" value="{{ default_date }}">
                            </div>
                            <div class="input-field">
                                <label>Search Activity</label>
                                <div class="search-wrapper">
                                    <input type="text" id="activity-search" placeholder="Type to search (e.g. running, yoga)..." autocomplete="off">
                                    <div class="search-results" id="activity-search-results"></div>
                                </div>
                            </div>
                            <div class="input-field">
                                <label>Or Browse by Activity Name</label>
                                <select id="activity-name-select" class="selectbox">
                                    <option value="">-- Select Activity --</option>
                                    {% for name in activity_names %}
                                    <option value="{{ name }}">{{ name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="input-field">
                                <label>Specific Motion</label>
                                <select id="activity-motion-select" class="selectbox">
                                    <option value="">-- Select activity first --</option>
                                </select>
                            </div>
                            <div class="input-field">
                                <label>MET Value: <strong id="met-value-display">0</strong></label>
                            </div>
                            <div class="input-field">
                                <label>Duration (minutes)</label>
                                <input type="number" id="activity-duration" min="1" value="30" placeholder="Duration in minutes">
                            </div>
                            <div class="input-field">
                                <label>Calories Burned: <strong id="activity-calories-display">0</strong></label>
                            </div>
                            <div class="input-field input-field-btn btn-set--center">
                                <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                                <button type="button" class="btn btn-primary" id="save-activity-btn">Save</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
