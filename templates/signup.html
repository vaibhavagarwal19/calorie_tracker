{% extends 'base.html' %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="signup-container">
    <div class="white-card">
        <h1>Sign Up</h1>
        <div class="card-body">
            <form method="POST" action="{% url 'signup' %}">
                {% csrf_token %}
                <div class="input-field">
                    <label>Name</label>
                    <input type="text" name="name" placeholder="Name" required />
                </div>
                <div class="input-field">
                    <label>Weight (kg)</label>
                    <input type="number" step="0.1" name="weight" placeholder="Weight in kg" required />
                </div>
                <div class="input-field">
                    <label>Height (cm)</label>
                    <input type="number" step="0.1" name="height" placeholder="Height in cm" required />
                </div>
                <div class="input-field">
                    <label>Gender</label>
                    <select name="sex" class="selectbox">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
                <div class="input-field">
                    <label>Age</label>
                    <input type="number" name="age" placeholder="Age in years" required />
                </div>
                <div class="input-field btn-set--right">
                    <button type="submit" class="btn-primary">Sign Up</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
