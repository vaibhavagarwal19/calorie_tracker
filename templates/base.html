{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calorie Tracker - {% block title %}Home{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/global.css' %}" rel="stylesheet">
</head>
<body>
    <div>
        <header class="header">
            <div class="container">
                <div class="logo">
                    <a href="{% url 'user_list' %}">
                        <h2 style="color: #fff; margin: 0;">Calorie Tracker</h2>
                    </a>
                </div>
            </div>
        </header>
        <div class="mid-container">
            {% block content %}{% endblock %}
        </div>
        <footer class="footer">
            <div class="container">
                <p>2026 Calorie Tracker, All Rights Reserved</p>
            </div>
        </footer>
    </div>

    <!-- Toast Notification -->
    <div aria-live="polite" aria-atomic="true" style="position:fixed;top:20px;right:20px;z-index:9999;">
        <div class="toast" id="app-toast" role="alert" data-delay="3000">
            <div class="toast-header">
                <strong class="mr-auto" id="toast-title">Success</strong>
                <button type="button" class="ml-2 mb-1 close" data-dismiss="toast">&times;</button>
            </div>
            <div class="toast-body" id="toast-body"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
    <script>
    function showToast(message, type) {
        var toast = $('#app-toast');
        var header = toast.find('.toast-header');
        var title = $('#toast-title');
        header.removeClass('bg-success bg-danger text-white');
        if (type === 'success') {
            header.addClass('bg-success text-white');
            title.text('Success');
        } else {
            header.addClass('bg-danger text-white');
            title.text('Error');
        }
        $('#toast-body').text(message);
        toast.toast('show');
    }

    // Keyboard navigation for search dropdowns
    $(document).on('keydown', '.search-wrapper input', function(e) {
        var results = $(this).siblings('.search-results');
        var items = results.find('.search-item');
        var active = results.find('.search-item.active');
        if (!results.is(':visible') || items.length === 0) return;

        if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (active.length === 0) {
                items.first().addClass('active');
            } else {
                active.removeClass('active');
                var next = active.next('.search-item');
                if (next.length) {
                    next.addClass('active');
                } else {
                    items.first().addClass('active');
                }
            }
            // Scroll active item into view
            var activeItem = results.find('.search-item.active');
            if (activeItem.length) {
                activeItem[0].scrollIntoView({ block: 'nearest' });
            }
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (active.length === 0) {
                items.last().addClass('active');
            } else {
                active.removeClass('active');
                var prev = active.prev('.search-item');
                if (prev.length) {
                    prev.addClass('active');
                } else {
                    items.last().addClass('active');
                }
            }
            var activeItem = results.find('.search-item.active');
            if (activeItem.length) {
                activeItem[0].scrollIntoView({ block: 'nearest' });
            }
        } else if (e.key === 'Enter') {
            e.preventDefault();
            if (active.length) {
                active.click();
            }
        } else if (e.key === 'Escape') {
            results.hide();
        }
    });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
